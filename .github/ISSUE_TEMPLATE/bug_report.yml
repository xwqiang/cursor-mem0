name: Bug report
description: Report a problem with cursor-mem0
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Include versions and steps to reproduce when possible.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. pip install cursor-mem0
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: e.g. 0.1.1 from pip
  - type: dropdown
    id: component
    attributes:
      label: Area
      options:
        - Memory add/search
        - Cursor SDK / LLM
        - MCP server
        - Embeddings / Qdrant
        - Install / packaging
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      render: shell
